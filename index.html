    <script>
      // Aggressive fix for "Cannot set property fetch of #<Window> which has only a getter"
      // This happens when a script tries to assign window.fetch = ... but the environment 
      // has locked it as a getter-only property.
      (function() {
        try {
          var originalFetch = window.fetch;
          if (originalFetch) {
            Object.defineProperty(window, 'fetch', {
              get: function() { return originalFetch; },
              set: function(v) { 
                console.warn('Ignored unauthorized fetch reassignment attempt:', v);
              },
              configurable: true,
              enumerable: true
            });
          }
        } catch (e) {
          console.warn('Fetch is already locked and non-configurable. Assignment errors might persist.');
        }
      })();
    </script>
